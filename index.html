<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0e1a" />
    <title>SlimeVenture</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="game" class="scene-hub">
        <!-- Top viewport: hosts EITHER the running treadmill (#path)
             OR the overworld map (#overworld) OR a text event (#event-view).
             The active one is controlled by the .scene-* class on #game. -->
        <section id="path" aria-label="Path viewport">
          <div class="lane-bg" data-lane="0"></div>
          <div class="lane-bg" data-lane="1"></div>
          <div class="lane-bg" data-lane="2"></div>
          <div id="lane-grid"></div>
          <div id="slime" class="slime">🟢</div>
          <div id="path-banner" class="path-banner"></div>
          <div id="level-progress">
            <div id="level-progress-fill"></div>
          </div>
        </section>

        <section id="overworld" aria-label="Overworld map">
          <div class="overworld-header">
            <span id="overworld-title">Choose your path</span>
            <span id="overworld-status"></span>
          </div>
          <div id="overworld-map"></div>
        </section>

        <section id="event-view" aria-label="Event encounter">
          <div class="event-card">
            <h3 id="event-title">Event</h3>
            <p id="event-text">Text</p>
            <div id="event-choices" class="event-choices"></div>
            <div id="event-result" class="event-result hidden"></div>
            <button id="event-continue" class="event-continue hidden">
              Continue
            </button>
          </div>
        </section>

        <!-- Inventory -->
        <section id="inventory" aria-label="Slime inventory">
          <div id="mutation-strip" class="mutation-strip"></div>

          <div class="zone-label">HELD — passive effects</div>
          <div id="held-zone" class="inv-zone"></div>

          <div class="zone-label">STOMACH — digesting</div>
          <div id="stomach-zone" class="inv-zone stomach"></div>

          <div class="inv-actions">
            <button id="grow-btn" class="inv-btn">🧪 Grow (10🪙)</button>
            <button id="discard-btn" class="inv-btn" disabled>🗑 Discard</button>
            <span id="inv-hint" class="inv-hint">Tap an item → tap a slot</span>
          </div>
        </section>

        <!-- Hub overlay (slime village). Visible only when scene-hub. -->
        <section id="hub" aria-label="Slime Hub">
          <div class="hub-inner">
            <div class="hub-title">SLIMEVENTURE</div>
            <div class="hub-sub">A wandering slime, a hungry world</div>
            <div class="hub-slime">🟢</div>
            <div class="hub-meta-line" id="hub-meta-line">XP: 0 · Lifetime: 0</div>
            <div class="hub-buildings">
              <button class="hub-building primary" id="hub-start">
                <div class="hub-icon">🌱</div>
                <div class="hub-name">Begin Adventure</div>
                <div class="hub-desc">Set out into the wilds</div>
              </button>
              <button class="hub-building" id="hub-upgrades">
                <div class="hub-icon">🧪</div>
                <div class="hub-name">Upgrade Lab</div>
                <div class="hub-desc">Spend Slime XP on permanent boons</div>
              </button>
              <button class="hub-building" id="hub-mutations">
                <div class="hub-icon">🧬</div>
                <div class="hub-name">Mutation Den</div>
                <div class="hub-desc">Coming soon</div>
              </button>
              <button class="hub-building" id="hub-codex">
                <div class="hub-icon">📖</div>
                <div class="hub-name">Slime Codex</div>
                <div class="hub-desc">Coming soon</div>
              </button>
              <button class="hub-building" id="hub-cosmetics">
                <div class="hub-icon">🎨</div>
                <div class="hub-name">Wardrobe</div>
                <div class="hub-desc">Coming soon</div>
              </button>
            </div>
          </div>
        </section>

        <!-- HUD -->
        <section id="hud" aria-label="HUD">
          <div class="hud-stats">
            <span id="hp" class="hud-stat">❤️ 20/20</span>
            <span id="gold" class="hud-stat">🪙 0</span>
            <span id="atk" class="hud-stat">⚔️ 1</span>
            <span id="lvl" class="hud-stat">Lv 1</span>
          </div>
          <div class="hud-buttons">
            <button id="lane-up" class="hud-btn">▲</button>
            <button id="lane-down" class="hud-btn">▼</button>
            <button id="pause-btn" class="hud-btn">⏸</button>
          </div>
        </section>

        <!-- Modal overlay -->
        <div id="modal" class="modal hidden">
          <div class="modal-card">
            <h2 id="modal-title">Title</h2>
            <div id="modal-body" class="modal-body">Body</div>
            <div id="modal-actions" class="modal-actions"></div>
          </div>
        </div>

        <!-- Event log -->
        <div id="log" class="log" aria-live="polite"></div>
      </div>
    </div>

    <script type="module" src="./js/game.js"></script>
  </body>
</html>
